kind = "web"
previewPath = "/"
title = "BERLIN Portfolio"
version = "1.0.0"
id = "artifacts/berlin-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26095

[services.development]
run = "pnpm --filter @workspace/berlin-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/berlin-portfolio", "run", "build" ]
publicDir = "artifacts/berlin-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26095"
BASE_PATH = "/"
